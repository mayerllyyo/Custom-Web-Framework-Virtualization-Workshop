version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework
    ports:
      - "8080:6000"
    environment:
      - PORT=6000
    restart: unless-stopped

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework2
    ports:
      - "8081:6000"
    environment:
      - PORT=6000
    restart: unless-stopped

  web3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework3
    ports:
      - "8082:6000"
    environment:
      - PORT=6000
    restart: unless-stopped
