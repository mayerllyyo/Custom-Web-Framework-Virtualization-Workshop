version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework2
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
    restart: unless-stopped

  web3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework3
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
