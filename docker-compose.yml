version: '3.8'

services:
  web1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework-1
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webframework-network

  web2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework-2
    ports:
      - "8081:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webframework-network

  web3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webframework-3
    ports:
      - "8082:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - webframework-network

networks:
  webframework-network:
    driver: bridge
